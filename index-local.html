<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#090b10">
    <title>GoblinAjedrez · Eliminación de la Defensa</title>
    <style>
.cg-wrap {
  box-sizing: content-box;
  position: relative;
  display: block;
}

cg-container {
  position: absolute;
  width: 100%;
  height: 100%;
  display: block;
  top: 0;
}

cg-board {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  line-height: 0;
  background-size: cover;
}

.cg-wrap.manipulable cg-board {
  cursor: pointer;
}

cg-board square {
  position: absolute;
  top: 0;
  left: 0;
  width: 12.5%;
  height: 12.5%;
  pointer-events: none;
}

cg-board square.move-dest {
  pointer-events: auto;
}

cg-board square.last-move {
  will-change: transform;
}

.cg-wrap piece {
  position: absolute;
  top: 0;
  left: 0;
  width: 12.5%;
  height: 12.5%;
  background-size: cover;
  z-index: 2;
  will-change: transform;
  pointer-events: none;
}

cg-board piece.dragging {
  cursor: move;
  /* !important to override z-index from 3D piece inline style */
  z-index: 11 !important;
}

piece.anim {
  z-index: 8;
}

piece.fading {
  z-index: 1;
  opacity: 0.5;
}

.cg-wrap piece.ghost {
  opacity: 0.3;
}

.cg-wrap piece svg {
  overflow: hidden;
  position: relative;
  top: 0px;
  left: 0px;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 2;
  opacity: 0.6;
}

.cg-wrap cg-auto-pieces,
.cg-wrap .cg-shapes,
.cg-wrap .cg-custom-svgs {
  overflow: visible;
  position: absolute;
  top: 0px;
  left: 0px;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.cg-wrap cg-auto-pieces {
  z-index: 2;
}

.cg-wrap cg-auto-pieces piece {
  opacity: 0.3;
}

.cg-wrap .cg-shapes {
  overflow: hidden;
  opacity: 0.6;
  z-index: 2;
}

.cg-wrap .cg-custom-svgs {
  /* over piece.anim = 8, but under piece.dragging = 11 */
  z-index: 9;
}

.cg-wrap .cg-custom-svgs svg {
  overflow: visible;
}

.cg-wrap coords {
  position: absolute;
  display: flex;
  pointer-events: none;
  opacity: 0.8;
  font-family: sans-serif;
  font-size: 9px;
}

.cg-wrap coords.ranks {
  left: 4px;
  top: -20px;
  flex-flow: column-reverse;
  height: 100%;
  width: 12px;
}

.cg-wrap coords.ranks.black {
  flex-flow: column;
}

.cg-wrap coords.ranks.left {
  left: -15px;
  align-items: flex-end;
}

.cg-wrap coords.files {
  bottom: -4px;
  left: 24px;
  flex-flow: row;
  width: 100%;
  height: 16px;
  text-transform: uppercase;
  text-align: center;
}

.cg-wrap coords.files.black {
  flex-flow: row-reverse;
}

.cg-wrap coords coord {
  flex: 1 1 auto;
}

.cg-wrap coords.ranks coord {
  transform: translateY(39%);
}

.cg-wrap coords.squares {
  bottom: 0;
  left: 0;
  text-transform: uppercase;
  text-align: right;
  flex-flow: column-reverse;
  height: 100%;
  width: 12.5%;
}

.cg-wrap coords.squares.black {
  flex-flow: column;
}

.cg-wrap coords.squares.left {
  text-align: left;
}

.cg-wrap coords.squares coord {
  padding: 6% 4%;
}

.cg-wrap coords.squares.rank2 {
  transform: translateX(100%);
}

.cg-wrap coords.squares.rank3 {
  transform: translateX(200%);
}

.cg-wrap coords.squares.rank4 {
  transform: translateX(300%);
}

.cg-wrap coords.squares.rank5 {
  transform: translateX(400%);
}

.cg-wrap coords.squares.rank6 {
  transform: translateX(500%);
}

.cg-wrap coords.squares.rank7 {
  transform: translateX(600%);
}

.cg-wrap coords.squares.rank8 {
  transform: translateX(700%);
}

/** Interactive board square colors */
cg-board square.move-dest {
  background: radial-gradient(rgba(20, 85, 30, 0.5) 22%, #208530 0, rgba(0, 0, 0, 0.3) 0, rgba(0, 0, 0, 0) 0);
}
cg-board square.premove-dest {
  background: radial-gradient(rgba(20, 30, 85, 0.5) 22%, #203085 0, rgba(0, 0, 0, 0.3) 0, rgba(0, 0, 0, 0) 0);
}
cg-board square.oc.move-dest {
  background: radial-gradient(transparent 0%, transparent 80%, rgba(20, 85, 0, 0.3) 80%);
}
cg-board square.oc.premove-dest {
  background: radial-gradient(transparent 0%, transparent 80%, rgba(20, 30, 85, 0.2) 80%);
}
cg-board square.move-dest:hover {
  background: rgba(20, 85, 30, 0.3);
}
cg-board square.premove-dest:hover {
  background: rgba(20, 30, 85, 0.2);
}
cg-board square.last-move {
  background-color: rgba(155, 199, 0, 0.41);
}
cg-board square.selected {
  background-color: rgba(20, 85, 30, 0.5);
}
cg-board square.check {
  background: radial-gradient(
    ellipse at center,
    rgba(255, 0, 0, 1) 0%,
    rgba(231, 0, 0, 1) 25%,
    rgba(169, 0, 0, 0) 89%,
    rgba(158, 0, 0, 0) 100%
  );
}
cg-board square.current-premove {
  background-color: rgba(20, 30, 85, 0.5);
}

/** Alternating colors in rank/file/square labels */
.orientation-white .ranks :nth-child(odd),
.orientation-white .files :nth-child(even),
.orientation-black .ranks :nth-child(even),
.orientation-black .files :nth-child(odd),
coords.squares:nth-of-type(odd) :nth-child(even),
coords.squares:nth-of-type(even) :nth-child(odd) {
  color: rgba(72, 72, 72, 0.8);
}

.orientation-white .ranks :nth-child(even),
.orientation-white .files :nth-child(odd),
.orientation-black .ranks :nth-child(odd),
.orientation-black .files :nth-child(even),
coords.squares:nth-of-type(odd) :nth-child(odd),
coords.squares:nth-of-type(even) :nth-child(even) {
  color: rgba(255, 255, 255, 0.8);
}

:root {
  color-scheme: dark;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #090b10;
  color: #f7f2e7;
  --bg: #090b10;
  --panel: rgba(9, 11, 16, 0.72);
  --line: rgba(247, 242, 231, 0.16);
  --text: #f7f2e7;
  --muted: #d6c6ad;
  --teal: #7fcdd8;
  --gold: #fff3bd;
  --coral: #ff7680;
  --orange: #ff7a45;
  --green: #91e6a5;
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
  min-height: 0;
  margin: 0;
  overflow: hidden;
}

body {
  display: grid;
  place-items: center;
  padding: clamp(6px, 1.8vmin, 14px);
  background:
    radial-gradient(circle at 18% 8%, rgba(95, 183, 197, 0.22), transparent 30%),
    radial-gradient(circle at 88% 78%, rgba(255, 122, 69, 0.16), transparent 34%),
    linear-gradient(135deg, #090b10 0%, #11161c 45%, #17110b 100%);
  background-size: 140% 140%;
  animation: arenaGlow 10s ease-in-out infinite;
}

button {
  font: inherit;
  -webkit-tap-highlight-color: transparent;
}

.game-shell {
  position: relative;
  width: min(100%, 920px);
  height: 100%;
  min-height: 0;
  display: grid;
  grid-template-rows: auto 1fr;
  gap: clamp(8px, 1.4vmin, 12px);
}

.hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  min-height: 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: clamp(6px, 1.2vmin, 10px);
  min-width: 0;
}

.brand img {
  width: clamp(34px, 8vmin, 48px);
  height: clamp(34px, 8vmin, 48px);
  object-fit: contain;
  filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.42));
}

.brand p,
.brand strong {
  display: block;
  margin: 0;
  line-height: 1.05;
}

.brand p {
  color: var(--teal);
  font-size: clamp(0.48rem, 1.7vmin, 0.78rem);
  text-transform: uppercase;
  letter-spacing: 0;
}

.brand strong {
  font-size: clamp(0.86rem, 3vmin, 1.36rem);
}

.stats {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
  gap: 6px;
}

.stats span {
  min-width: clamp(74px, 18vmin, 104px);
  min-height: clamp(34px, 8vmin, 48px);
  display: grid;
  grid-template-columns: auto 1fr;
  grid-template-rows: 1fr auto;
  column-gap: 5px;
  align-items: center;
  padding: clamp(4px, 1vmin, 7px) clamp(6px, 1.5vmin, 10px);
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(9, 11, 16, 0.62);
  color: var(--muted);
  text-align: left;
}

.stats b {
  display: block;
  color: var(--text);
  font-size: clamp(0.72rem, 2.4vmin, 1rem);
  line-height: 1;
}

.stats em {
  grid-row: 1 / 3;
  width: 18px;
  font-style: normal;
  line-height: 1;
  text-align: center;
}

.stats small {
  display: block;
  color: var(--muted);
  font-size: clamp(0.46rem, 1.45vmin, 0.65rem);
  line-height: 1;
  text-transform: uppercase;
  letter-spacing: 0;
}

.level-screen,
.play-screen {
  min-height: 0;
}

.level-screen {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: clamp(10px, 2vmin, 18px);
  align-items: center;
  justify-items: center;
  text-align: center;
}

.screen-copy {
  display: grid;
  justify-items: center;
  gap: clamp(9px, 1.8vmin, 14px);
}

.screen-copy img {
  width: clamp(62px, 15vmin, 112px);
  aspect-ratio: 1;
  object-fit: contain;
  filter: drop-shadow(0 16px 26px rgba(0, 0, 0, 0.5));
}

h1,
.screen-copy p {
  margin: 0;
}

h1 {
  max-width: 430px;
  font-size: clamp(2rem, 7vmin, 4.2rem);
  line-height: 0.95;
  text-wrap: balance;
}

.screen-copy p {
  max-width: 390px;
  color: var(--muted);
  font-size: clamp(0.92rem, 2.4vmin, 1.1rem);
  font-weight: 700;
  text-wrap: balance;
}

.primary-button,
.ghost-button {
  min-height: 44px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 900;
}

.primary-button {
  min-width: clamp(150px, 34vmin, 220px);
  padding: 0 18px;
  border: 2px solid rgba(255, 248, 216, 0.18);
  background: linear-gradient(180deg, #8be8f1 0%, #65c7d4 58%, #33939e 100%);
  box-shadow:
    0 12px 28px rgba(0, 0, 0, 0.34),
    inset 0 2px 0 rgba(255, 255, 255, 0.28);
  color: #061014;
}

.primary-button:active,
.ghost-button:active {
  transform: translateY(1px);
}

.ghost-button {
  min-width: 110px;
  padding: 0 13px;
  border: 1px solid var(--line);
  background: rgba(9, 11, 16, 0.58);
  color: var(--text);
}

.primary-button.hidden,
.hidden {
  display: none !important;
}

.level-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: clamp(6px, 1.4vmin, 10px);
}

.level-card {
  aspect-ratio: 1;
  display: grid;
  align-content: space-between;
  justify-items: start;
  gap: 8px;
  padding: clamp(10px, 2vmin, 14px);
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(155deg, rgba(127, 205, 216, 0.12), transparent 44%),
    rgba(9, 11, 16, 0.68);
  color: var(--text);
  text-align: left;
  cursor: pointer;
}

.level-card small {
  justify-self: stretch;
  display: inline-grid;
  place-items: center;
  min-height: 22px;
  padding: 3px 6px;
  border-radius: 999px;
  background: rgba(127, 205, 216, 0.13);
  color: var(--teal);
  font-size: clamp(0.52rem, 1.45vmin, 0.68rem);
  font-weight: 900;
  line-height: 1;
  text-transform: uppercase;
  letter-spacing: 0;
}

.level-card b {
  font-size: clamp(1.35rem, 5vmin, 2.45rem);
  line-height: 0.9;
}

.level-card span {
  color: var(--muted);
  font-size: clamp(0.7rem, 2vmin, 0.92rem);
  font-weight: 800;
  line-height: 1.1;
}

.level-card.locked {
  cursor: default;
  opacity: 0.58;
  background: rgba(9, 11, 16, 0.48);
}

.level-card.locked small {
  background: rgba(255, 243, 189, 0.1);
  color: var(--muted);
}

.level-card.completed {
  border-color: rgba(145, 230, 165, 0.62);
  box-shadow: 0 0 24px rgba(145, 230, 165, 0.12);
}

.level-card.completed small {
  background: rgba(145, 230, 165, 0.16);
  color: var(--green);
}

.play-screen {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  gap: clamp(7px, 1.3vmin, 12px);
}

.question-row {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: center;
  gap: 10px;
}

.question-row p {
  margin: 0;
  color: var(--gold);
  font-size: clamp(0.88rem, 2.4vmin, 1.06rem);
  font-weight: 900;
  text-align: right;
}

.board-stage {
  min-height: 0;
  display: grid;
  place-items: center;
}

.board-wrap {
  position: relative;
  width: min(100%, calc(100vh - clamp(190px, 34vmin, 240px)));
  max-width: 680px;
  aspect-ratio: 1;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: visible;
  background: #0c1014;
  box-shadow: 0 18px 70px rgba(0, 0, 0, 0.34);
}

#board,
#particles {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  touch-action: none;
}

#board {
  border-radius: 7px;
  overflow: hidden;
}

#particles {
  z-index: 5;
  pointer-events: none;
}

.tutorial-badge {
  position: absolute;
  z-index: 6;
  display: grid;
  place-items: center;
  width: 12.5%;
  height: 12.5%;
  border: clamp(3px, 0.9vmin, 6px) solid rgba(244, 163, 64, 0.92);
  border-radius: 999px;
  background: rgba(244, 163, 64, 0.08);
  box-shadow:
    0 0 0 clamp(4px, 1.1vmin, 8px) rgba(244, 163, 64, 0.18),
    inset 0 0 18px rgba(244, 163, 64, 0.16),
    0 0 26px rgba(244, 163, 64, 0.52);
  pointer-events: none;
  transform: translate(-50%, -50%);
  animation: tutorialRing 1000ms ease-in-out infinite;
}

.tutorial-badge::after {
  content: "";
  position: absolute;
  inset: 14%;
  border: 2px solid rgba(145, 230, 165, 0.78);
  border-radius: inherit;
  box-shadow: 0 0 18px rgba(145, 230, 165, 0.35);
}

.capture-badge {
  position: absolute;
  z-index: 8;
  display: grid;
  place-items: center;
  width: 7.5%;
  height: 7.5%;
  border-radius: 999px;
  background: transparent;
  box-shadow: none;
  font-size: clamp(0.7rem, 2.5vmin, 1.2rem);
  filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.42));
  pointer-events: none;
  transform: translate(22%, -122%);
  animation: swordPop 650ms cubic-bezier(.2, 1.6, .4, 1);
}

.exposed-badge {
  position: absolute;
  z-index: 7;
  display: grid;
  place-items: center;
  width: 13%;
  height: 13%;
  font-size: clamp(1.35rem, 5.5vmin, 2.8rem);
  pointer-events: none;
  opacity: 0.95;
  transform: translate(-50%, -50%);
  filter: drop-shadow(0 0 7px rgba(255, 238, 158, 0.95)) drop-shadow(0 0 18px rgba(255, 112, 47, 0.85));
  animation: exposedPop 1200ms cubic-bezier(.15, 1.2, .35, 1) both;
}

.exposed-badge::before,
.exposed-badge::after {
  content: "";
  position: absolute;
  inset: -18%;
  border: 3px solid rgba(255, 196, 88, 0.85);
  border-radius: 50%;
  animation: blastRing 1100ms ease-out both;
}

.exposed-badge::after {
  inset: -36%;
  border-width: 2px;
  border-color: rgba(255, 105, 55, 0.65);
  animation-delay: 100ms;
}

.victory-overlay {
  position: absolute;
  inset: 0;
  z-index: 20;
  display: grid;
  place-items: center;
  padding: 18px;
  background: radial-gradient(circle, rgba(24, 61, 52, 0.82), rgba(5, 7, 10, 0.94));
  backdrop-filter: blur(7px);
}

.victory-card {
  width: min(100%, 520px);
  display: grid;
  justify-items: center;
  gap: 12px;
  padding: clamp(24px, 6vmin, 48px);
  border: 1px solid rgba(255, 243, 189, 0.45);
  border-radius: 18px;
  background: linear-gradient(145deg, rgba(127, 205, 216, 0.18), rgba(9, 11, 16, 0.92));
  box-shadow: 0 24px 90px rgba(0, 0, 0, 0.55), 0 0 55px rgba(145, 230, 165, 0.18);
  text-align: center;
  animation: victoryIn 650ms cubic-bezier(.2, 1.25, .4, 1);
}

.victory-trophy {
  display: grid;
  place-items: center;
  width: clamp(72px, 17vmin, 112px);
  aspect-ratio: 1;
  border: 3px solid var(--gold);
  border-radius: 50%;
  background: linear-gradient(145deg, #fff3bd, #dba940);
  color: #42300b;
  box-shadow: 0 0 34px rgba(255, 243, 189, 0.3);
  font-size: clamp(2.5rem, 8vmin, 4.5rem);
  animation: trophyFloat 1.8s ease-in-out infinite;
}

.victory-card p,
.victory-card h2,
.victory-card span { margin: 0; }
.victory-card p { color: var(--green); font-weight: 950; letter-spacing: 0.12em; }
.victory-card h2 { color: var(--gold); font-size: clamp(1.8rem, 6vmin, 3.5rem); line-height: 1; }
.victory-card span { max-width: 390px; color: var(--muted); font-weight: 750; line-height: 1.45; }

.cg-wrap {
  width: 100%;
  height: 100%;
}

.cg-wrap coords {
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.55);
  font-family: inherit;
  font-weight: 900;
}

.cg-wrap.orientation-white coords.ranks {
  right: 2px;
}

.cg-wrap.orientation-white coords.files {
  bottom: 2px;
}

cg-board square.correct-square {
  background: rgba(145, 230, 165, 0.58);
  box-shadow: inset 0 0 0 4px rgba(14, 88, 37, 0.52);
}

cg-board square.wrong-square {
  background: rgba(255, 118, 128, 0.62);
  box-shadow: inset 0 0 0 4px rgba(128, 23, 34, 0.55);
}

#board piece.piece-wrong {
  animation: pieceWrong 260ms ease-out;
  filter: drop-shadow(0 0 12px rgba(255, 118, 128, 0.9));
}

#board piece.piece-correct {
  animation: pieceCorrect 760ms ease-out;
}

.feedback-msg {
  position: absolute;
  top: clamp(8px, 2vmin, 14px);
  left: 50%;
  z-index: 7;
  min-width: 0;
  max-width: 64%;
  padding: clamp(5px, 1.2vmin, 8px) clamp(10px, 2.4vmin, 16px);
  border-radius: 8px;
  background: rgba(5, 7, 10, 0.82);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  color: var(--text);
  font-size: clamp(0.78rem, 2.1vmin, 1rem);
  font-weight: 900;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transform: translate(-50%, -8px) scale(0.92);
  transition: opacity 120ms ease, transform 120ms ease;
  white-space: nowrap;
}

.feedback-msg.show {
  opacity: 1;
  transform: translate(-50%, 0) scale(1);
}

.feedback-msg.correct {
  border: 1px solid rgba(145, 230, 165, 0.62);
  color: var(--green);
}

.feedback-msg.wrong {
  border: 1px solid rgba(255, 118, 128, 0.62);
  color: var(--coral);
}

.board-wrap.shake {
  animation: boardShake 180ms ease-out;
}

.board-wrap.pulse {
  animation: boardPulse 360ms ease-out;
}

.result-panel {
  display: none;
  grid-template-columns: minmax(0, 1fr);
  align-items: center;
  gap: 8px 12px;
  min-height: 64px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(9, 11, 16, 0.62);
}

.result-panel strong,
.result-panel p {
  margin: 0;
}

.result-panel strong {
  font-size: clamp(0.92rem, 2.4vmin, 1.08rem);
}

.result-panel p {
  grid-column: 1;
  color: var(--muted);
  font-size: clamp(0.78rem, 2vmin, 0.95rem);
  font-weight: 700;
}

@keyframes arenaGlow {
  0%,
  100% {
    background-position: 0% 30%;
  }
  50% {
    background-position: 100% 70%;
  }
}

@keyframes boardShake {
  0% { transform: translate(0); }
  20% { transform: translate(-4px, 2px); }
  40% { transform: translate(4px, -1px); }
  60% { transform: translate(-3px, 1px); }
  80% { transform: translate(3px, -1px); }
  100% { transform: translate(0); }
}

@keyframes boardPulse {
  0% { box-shadow: 0 18px 70px rgba(0, 0, 0, 0.34); }
  45% { box-shadow: 0 18px 76px rgba(145, 230, 165, 0.34); }
  100% { box-shadow: 0 18px 70px rgba(0, 0, 0, 0.34); }
}

@keyframes pieceWrong {
  0% { transform: translate(var(--cg-tx, 0), var(--cg-ty, 0)) scale(1); }
  25% { transform: translate(var(--cg-tx, 0), var(--cg-ty, 0)) translateX(-5px) rotate(-4deg) scale(1.04); }
  55% { transform: translate(var(--cg-tx, 0), var(--cg-ty, 0)) translateX(5px) rotate(4deg) scale(1.04); }
  100% { transform: translate(var(--cg-tx, 0), var(--cg-ty, 0)) scale(1); }
}

@keyframes pieceCorrect {
  0%, 100% { filter: drop-shadow(0 0 0 rgba(145, 230, 165, 0)); }
  40% { filter: drop-shadow(0 0 18px rgba(145, 230, 165, 1)) drop-shadow(0 0 34px rgba(127, 205, 216, 0.72)); }
}

@keyframes victoryIn {
  0% {
    opacity: 0;
    transform: translateY(8px) scale(0.94);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes tutorialRing {
  0%,
  100% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.95;
  }
  50% {
    transform: translate(-50%, -50%) scale(1.13);
    opacity: 1;
  }
}

@keyframes swordPop {
  0% { opacity: 0; transform: translate(22%, -122%) scale(0) rotate(-35deg); }
  70% { opacity: 1; transform: translate(22%, -122%) scale(1.2) rotate(8deg); }
  100% { transform: translate(22%, -122%) scale(1) rotate(0); }
}

@keyframes exposedPop {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2) rotate(-15deg); }
  35% { opacity: 1; transform: translate(-50%, -50%) scale(1.35) rotate(8deg); }
  62% { transform: translate(-50%, -50%) scale(0.92) rotate(-3deg); }
  82% { transform: translate(-50%, -50%) scale(1.12) rotate(2deg); }
  100% { opacity: 0.88; transform: translate(-50%, -50%) scale(1) rotate(0); }
}

@keyframes blastRing {
  0% { opacity: 0.95; transform: scale(0.2); }
  100% { opacity: 0; transform: scale(1.8); }
}

@keyframes trophyFloat {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-10px) rotate(3deg); }
}

@media (max-width: 740px) {
  body {
    padding: 6px;
  }

  .game-shell {
    gap: 7px;
  }

  .hud {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    width: 100%;
    gap: 4px;
  }

  .stats span {
    min-width: 0;
    min-height: 36px;
    grid-template-columns: 1fr;
    grid-template-rows: auto auto;
    justify-items: center;
    padding: 4px 3px;
    text-align: center;
  }

  .stats em {
    display: none;
  }

  .stats small {
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .level-screen {
    grid-template-columns: 1fr;
    align-content: center;
  }

  .screen-copy {
    justify-items: center;
    text-align: center;
  }

  .screen-copy img {
    width: clamp(46px, 12vmin, 68px);
  }

  .question-row {
    grid-template-columns: 1fr;
    gap: 6px;
  }

  .question-row p {
    text-align: left;
  }

  .board-wrap {
    width: min(100%, calc(100vh - 240px));
  }

  .result-panel {
    grid-template-columns: 1fr;
    min-height: 0;
  }

  .result-panel p,
  .result-panel strong {
    grid-column: 1;
  }
}

@media (max-height: 520px) and (orientation: landscape) {
  .hud {
    display: flex;
  }

  .brand img {
    width: 32px;
    height: 32px;
  }

  .stats span {
    min-height: 32px;
  }

  .level-screen {
    grid-template-columns: 1fr;
  }

  .screen-copy img {
    display: none;
  }

  .board-wrap {
    width: min(55vh, 70vw);
  }

  .result-panel {
    min-height: 50px;
  }
}

(function () {
  "use strict";

  const STORAGE_KEY = "goblin-elimina-defensa-run";
  const allLevels = window.levels || [];
  const playableLevels = allLevels.filter((level) => level.fen && level.firstMove && !level.locked);
  const exposedSquares = {
    1: "h7", 2: "d5", 3: "c2", 4: "f5", 5: "d7",
    6: "f5", 7: "b4", 8: "d7", 9: "g4",
    10: "h7", 11: "e7", 12: "f6", 13: "b2", 14: "d7",
    15: "d7", 16: "g4", 17: "e7", 18: "b6", 19: "d7",
    20: "d6", 21: "d5", 22: "b4", 23: "g4", 24: "d2",
    25: "h5", 26: "g4", 27: "g8", 28: "g4", 29: "d3", 30: "g4"
  };

  const startScreen = document.getElementById("startScreen");
  const playScreen = document.getElementById("playScreen");
  const playButton = document.getElementById("playButton");
  const backButton = document.getElementById("backButton");
  const levelCounter = document.getElementById("levelCounter");
  const lifeCounter = document.getElementById("lifeCounter");
  const streakCounter = document.getElementById("streakCounter");
  const bestCounter = document.getElementById("bestCounter");
  const questionText = document.getElementById("questionText");
  const feedbackMsg = document.getElementById("feedbackMsg");
  const resultPanel = document.getElementById("resultPanel");
  const resultTitle = document.getElementById("resultTitle");
  const resultText = document.getElementById("resultText");
  const boardWrap = document.querySelector(".board-wrap");
  const boardElement = document.getElementById("board");
  const tutorialBadge = document.getElementById("tutorialBadge");
  const particleCanvas = document.getElementById("particles");
  const particleCtx = particleCanvas.getContext("2d");
  const captureBadge = document.createElement("div");
  captureBadge.className = "capture-badge hidden";
  captureBadge.textContent = "⚔️";
  boardWrap.appendChild(captureBadge);
  const exposedBadge = document.createElement("div");
  exposedBadge.className = "exposed-badge hidden";
  exposedBadge.textContent = "☠️";
  boardWrap.appendChild(exposedBadge);
  const victoryOverlay = document.createElement("div");
  victoryOverlay.className = "victory-overlay hidden";
  victoryOverlay.innerHTML = `
    <div class="victory-card">
      <div class="victory-trophy" aria-hidden="true">★</div>
      <h2>¡Enhorabuena!</h2>
      <button class="primary-button" id="replayButton" type="button">Jugar otra vez</button>
    </div>`;
  playScreen.appendChild(victoryOverlay);

  let ground = null;
  let audioCtx = null;
  let activeLevel = null;
  let activeIndex = 0;
  let activeMove = null;
  let targetSquare = null;
  let solved = false;
  let streak = 0;
  let autoAdvanceId = null;
  let challengeStartedAt = 0;
  let particles = [];
  let progress = loadProgress();

  function loadProgress() {
    try {
      const stored = JSON.parse(localStorage.getItem(STORAGE_KEY));
      return {
        bestStreak: Number(stored?.bestStreak || 0),
        perfectSolved: Number(stored?.perfectSolved || 0)
      };
    } catch {
      return { bestStreak: 0, perfectSolved: 0 };
    }
  }

  function saveProgress() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    } catch {}
  }

  function updateHud() {
    levelCounter.textContent = `${Math.min(activeIndex + 1, playableLevels.length)}/${playableLevels.length}`;
    lifeCounter.textContent = "1";
    streakCounter.textContent = String(streak);
    bestCounter.textContent = String(progress.bestStreak);
  }

  function ensureAudio() {
    if (!audioCtx) {
      const AudioCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtor) return;
      audioCtx = new AudioCtor();
      const master = audioCtx.createGain();
      master.gain.value = 0.42;
      master.connect(audioCtx.destination);
      audioCtx._master = master;
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
  }

  function playTone(freq, duration, type, volume) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    osc.connect(gain);
    gain.connect(audioCtx._master || audioCtx.destination);
    osc.start(now);
    osc.stop(now + duration);
  }

  function playNoise(duration, volume, filterFreq) {
    if (!audioCtx) return;
    const sampleRate = audioCtx.sampleRate;
    const buffer = audioCtx.createBuffer(1, sampleRate * duration, sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;

    const source = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    source.buffer = buffer;
    filter.type = "lowpass";
    filter.frequency.value = filterFreq;
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    source.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx._master || audioCtx.destination);
    source.start();
    source.stop(audioCtx.currentTime + duration);
  }

  function playSuccessSound() {
    playNoise(0.06, 0.12, 5200);
    playTone(520, 0.11, "triangle", 0.08);
    setTimeout(() => playTone(720, 0.1, "sine", 0.07), 70);
    setTimeout(() => playTone(960, 0.14, "sine", 0.06), 140);
  }

  function playErrorSound() {
    playNoise(0.13, 0.14, 1800);
    playTone(260, 0.12, "sawtooth", 0.07);
    setTimeout(() => playTone(118, 0.16, "square", 0.05), 90);
  }

  function playVictorySound() {
    [523, 659, 784, 1047].forEach((frequency, index) => {
      setTimeout(() => playTone(frequency, 0.34, "triangle", 0.09), index * 135);
    });
  }

  function computeFirstMove(level) {
    const chess = new Chess(level.fen);
    const move = chess.move(level.firstMove);
    if (!move || !move.to) {
      throw new Error(`No se pudo calcular la casilla objetivo del reto ${level.id}`);
    }
    return move;
  }

  function orientationFromFen(fen) {
    return fen.split(/\s+/)[1] === "b" ? "black" : "white";
  }

  function showStartScreen() {
    clearAutoAdvance();
    activeLevel = null;
    activeMove = null;
    targetSquare = null;
    solved = false;
    streak = 0;
    if (ground) {
      ground.destroy();
      ground = null;
    }
    startScreen.classList.remove("hidden");
    playScreen.classList.add("hidden");
    tutorialBadge.classList.add("hidden");
    captureBadge.classList.add("hidden");
    exposedBadge.classList.add("hidden");
    victoryOverlay.classList.add("hidden");
    feedbackMsg.className = "feedback-msg";
    activeIndex = 0;
    updateHud();
  }

  function startRun() {
    ensureAudio();
    streak = 0;
    activeIndex = 0;
    startChallenge(activeIndex);
  }

  function startChallenge(index) {
    const level = playableLevels[index];
    if (!level) {
      resultTitle.textContent = "No hay retos preparados.";
      resultText.textContent = "Añade posiciones a levels.js para continuar.";
      return;
    }

    activeLevel = level;
    activeMove = computeFirstMove(level);
    targetSquare = activeMove.to;
    solved = false;
    challengeStartedAt = performance.now();
    particles = [];
    clearParticles();
    startScreen.classList.add("hidden");
    playScreen.classList.remove("hidden");
    tutorialBadge.classList.add("hidden");
    captureBadge.classList.add("hidden");
    exposedBadge.classList.add("hidden");
    victoryOverlay.classList.add("hidden");
    questionText.textContent = "";
    resultTitle.textContent = "";
    resultText.textContent = "";
    resultPanel.classList.remove("solved");
    feedbackMsg.className = "feedback-msg";
    clearPieceEffects();
    updateHud();

    if (ground) ground.destroy();
    ground = Chessground(boardElement, {
      fen: level.fen,
      orientation: orientationFromFen(level.fen),
      coordinates: true,
      viewOnly: false,
      selectable: { enabled: false },
      draggable: { enabled: false },
      movable: {
        color: undefined,
        free: false,
        showDests: false,
        dests: new Map()
      },
      highlight: {
        lastMove: false,
        check: false,
        custom: new Map()
      },
      drawable: {
        enabled: false,
        visible: true,
        brushes: {
          orange: { key: "orange", color: "#f4a340", opacity: 0.78, lineWidth: 10 }
        }
      },
      animation: { enabled: true, duration: 160 },
      events: {
        select: handleSquareClick
      }
    });

    applyTutorial();
  }

  function handleSquareClick(square) {
    if (!activeLevel || solved || !targetSquare) return;
    ensureAudio();

    if (square === targetSquare) {
      handleCorrect(square);
    } else {
      handleWrong(square);
    }
  }

  function handleCorrect(square) {
    solved = true;
    tutorialBadge.classList.add("hidden");
    streak += 1;
    progress.perfectSolved += 1;
    progress.bestStreak = Math.max(progress.bestStreak, streak);
    saveProgress();

    setHighlight(square, "correct-square");
    animatePiece(square, "piece-correct", 900);
    showCaptureBadge(square);
    ground.setAutoShapes([{ orig: activeMove.from, dest: activeMove.to, brush: "green" }]);
    const exposedSquare = exposedSquares[activeLevel.id];
    if (exposedSquare) setTimeout(() => showExposedBadge(exposedSquare), 420);
    showFeedback("✓ Correcto", true);
    playSuccessSound();
    spawnParticles(square, 42, "#91e6a5");
    boardWrap.classList.remove("pulse");
    void boardWrap.offsetWidth;
    boardWrap.classList.add("pulse");
    resultTitle.textContent = "";
    resultText.textContent = "";
    updateHud();
    autoAdvanceId = setTimeout(continueRun, 1500);
  }

  function handleWrong(square) {
    solved = true;
    tutorialBadge.classList.add("hidden");
    setHighlight(square, "wrong-square");
    animatePiece(square, "piece-wrong", 340);
    showFeedback("❌ Fallo", false);
    playErrorSound();
    boardWrap.classList.remove("shake");
    void boardWrap.offsetWidth;
    boardWrap.classList.add("shake");
    resultTitle.textContent = "❌ Fallo";
    resultText.textContent = "";
    streak = 0;
    updateHud();
    setTimeout(() => {
      activeIndex = 0;
      startChallenge(activeIndex);
    }, 950);
  }

  function continueRun() {
    clearAutoAdvance();
    activeIndex += 1;
    if (activeIndex >= playableLevels.length) {
      activeIndex = playableLevels.length - 1;
      updateHud();
      questionText.textContent = "¡Has completado todos los niveles!";
      resultTitle.textContent = "¡Enhorabuena!";
      resultText.textContent = "Has completado los 30 niveles.";
      resultPanel.classList.add("solved");
      showFeedback("¡Enhorabuena!", true);
      victoryOverlay.classList.remove("hidden");
      playVictorySound();
      spawnVictoryParticles();
      return;
    }
    startChallenge(activeIndex);
  }

  function clearAutoAdvance() {
    if (autoAdvanceId) {
      clearTimeout(autoAdvanceId);
      autoAdvanceId = null;
    }
  }

  function setHighlight(square, cssClass) {
    if (!ground) return;
    const custom = new Map();
    if (square && cssClass) custom.set(square, cssClass);
    ground.set({ highlight: { custom } });
  }

  function applyTutorial() {
    if (!ground || !activeLevel || activeLevel.id !== 1 || !activeMove) return;
    const tutorialShapes = [
      { orig: activeMove.from, dest: activeMove.to, brush: "green" },
      { orig: "h3", dest: "h7", brush: "orange" }
    ];
    ground.setAutoShapes(tutorialShapes);
    requestAnimationFrame(() => positionTutorialBadge(activeMove.to));
  }

  function positionTutorialBadge(square) {
    if (!square || activeLevel?.id !== 1) return;
    const point = squarePoint(square);
    tutorialBadge.style.left = `${point.x}%`;
    tutorialBadge.style.top = `${point.y}%`;
    tutorialBadge.classList.remove("hidden");
  }

  function showCaptureBadge(square) {
    const point = squarePoint(square);
    captureBadge.style.left = `${point.x}%`;
    captureBadge.style.top = `${point.y}%`;
    captureBadge.classList.remove("hidden");
  }

  function showExposedBadge(square) {
    if (!solved || exposedSquares[activeLevel?.id] !== square) return;
    const point = squarePoint(square);
    exposedBadge.style.left = `${point.x}%`;
    exposedBadge.style.top = `${point.y}%`;
    exposedBadge.classList.remove("hidden");
    spawnParticles(square, 34, "#ff9b55");
  }

  function spawnVictoryParticles() {
    resizeParticles();
    const colors = ["#91e6a5", "#fff3bd", "#7fcdd8", "#ff7a45", "#ff7680"];
    for (let i = 0; i < 150; i++) {
      particles.push({
        x: Math.random() * particleCanvas.width,
        y: -20 - Math.random() * particleCanvas.height * 0.35,
        vx: -1.8 + Math.random() * 3.6,
        vy: 2.5 + Math.random() * 5,
        life: 1,
        decay: 0.004 + Math.random() * 0.006,
        size: 4 + Math.random() * 8,
        color: colors[i % colors.length]
      });
    }
  }

  function clearPieceEffects() {
    boardElement.querySelectorAll("piece.piece-wrong, piece.piece-correct").forEach((piece) => {
      piece.classList.remove("piece-wrong", "piece-correct");
    });
  }

  function animatePiece(square, className, duration) {
    const piece = findPieceElement(square);
    if (!piece) return;
    syncTransformVars(piece);
    piece.classList.remove("piece-wrong", "piece-correct");
    void piece.offsetWidth;
    piece.classList.add(className);
    setTimeout(() => {
      if (piece.isConnected) piece.classList.remove(className);
    }, duration);
  }

  function findPieceElement(square) {
    return Array.from(boardElement.querySelectorAll("piece")).find((piece) => piece.cgKey === square);
  }

  function syncTransformVars(piece) {
    const transform = piece.style.transform || "";
    const match = transform.match(/translate\(([^,]+),\s*([^)]+)\)/);
    if (!match) return;
    piece.style.setProperty("--cg-tx", match[1].trim());
    piece.style.setProperty("--cg-ty", match[2].trim());
  }

  function showFeedback(message, correct) {
    feedbackMsg.textContent = message;
    feedbackMsg.className = `feedback-msg show ${correct ? "correct" : "wrong"}`;
    clearTimeout(window._goblinFeedbackTimer);
    window._goblinFeedbackTimer = setTimeout(() => {
      feedbackMsg.className = "feedback-msg";
    }, correct ? 1200 : 850);
  }

  function squareCenter(square) {
    const file = square.charCodeAt(0) - 97;
    const rank = Number(square[1]) - 1;
    const white = orientationFromFen(activeLevel.fen) === "white";
    const col = white ? file : 7 - file;
    const row = white ? 7 - rank : rank;
    const size = particleCanvas.width / 8;
    return {
      x: col * size + size / 2,
      y: row * size + size / 2
    };
  }

  function squarePoint(square) {
    const file = square.charCodeAt(0) - 97;
    const rank = Number(square[1]) - 1;
    const white = orientationFromFen(activeLevel.fen) === "white";
    const col = white ? file : 7 - file;
    const row = white ? 7 - rank : rank;
    return {
      x: ((col + 0.5) / 8) * 100,
      y: ((row + 0.5) / 8) * 100
    };
  }

  function resizeParticles() {
    const rect = particleCanvas.getBoundingClientRect();
    const size = Math.max(320, Math.round(rect.width * window.devicePixelRatio));
    if (particleCanvas.width !== size || particleCanvas.height !== size) {
      particleCanvas.width = size;
      particleCanvas.height = size;
    }
  }

  function spawnParticles(square, count, color) {
    resizeParticles();
    const center = squareCenter(square);
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2.2 + Math.random() * 5.2;
      particles.push({
        x: center.x,
        y: center.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.014 + Math.random() * 0.026,
        size: 3 + Math.random() * 6,
        color
      });
    }
  }

  function clearParticles() {
    particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
  }

  function tickParticles() {
    if (particles.length) {
      clearParticles();
      for (let i = particles.length - 1; i >= 0; i--) {
        const particle = particles[i];
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.vy += 0.08;
        particle.life -= particle.decay;
        if (particle.life <= 0) {
          particles.splice(i, 1);
          continue;
        }
        particleCtx.globalAlpha = particle.life;
        particleCtx.fillStyle = particle.color;
        particleCtx.beginPath();
        particleCtx.arc(particle.x, particle.y, particle.size * particle.life, 0, Math.PI * 2);
        particleCtx.fill();
      }
      particleCtx.globalAlpha = 1;
    }
    requestAnimationFrame(tickParticles);
  }

  playButton.addEventListener("click", startRun);
  backButton.addEventListener("click", showStartScreen);
  victoryOverlay.querySelector("#replayButton").addEventListener("click", startRun);
  window.addEventListener("resize", resizeParticles);

  updateHud();
  tickParticles();
})();

    </script>
  </body>
</html>
